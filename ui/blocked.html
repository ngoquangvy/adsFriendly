<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdsFriendly - Verification</title>
    <style>
        :root {
            --primary: #22c55e;
            --secondary: #16a34a;
            --danger: #ff4d4d;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 90%;
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .header { margin-bottom: 2rem; }
        
        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }

        .icon-circle svg { width: 35px; height: 35px; fill: #000; }

        h1 { font-size: 1.6rem; margin: 0 0 0.5rem; color: #fff; }
        .source-info { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; }
        .source-info strong { color: var(--primary); }

        .url-preview {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 14px;
            font-family: 'JetBrains Mono', monospace;
            color: #cbd5e1;
            word-break: break-all;
            margin-bottom: 2.5rem;
            font-size: 0.85rem;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        button {
            padding: 0.9rem 1rem;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-whitelist { background: #22c55e; color: #fff; }
        .btn-whitelist:hover { background: #16a34a; transform: translateY(-2px); }

        .btn-blacklist { background: var(--danger); color: #fff; }
        .btn-blacklist:hover { background: #e60000; transform: translateY(-2px); }

        .btn-once { background: #334155; color: #fff; grid-column: span 2; }
        .btn-once:hover { background: #475569; }

        .btn-close { 
            background: transparent; 
            color: #64748b; 
            grid-column: span 2; 
            font-weight: 400;
            text-decoration: underline;
        }

        .footer-timer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            </div>
            <h1>AdsFriendly Protection</h1>
            <div class="source-info">We prevented <strong><span id="source-domain"></span></strong> from opening a new tab in the background:</div>
        </div>

        <div class="url-preview" id="target-url">Loading...</div>
        
        <div class="action-grid">
            <button class="btn-whitelist" id="btn-whitelist">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                Always Trust
            </button>
            <button class="btn-blacklist" id="btn-blacklist">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
                Always Block
            </button>
            <button class="btn-once" id="btn-once">Open Once</button>
            <button class="btn-close" id="btn-close">Close Now</button>
        </div>

        <div class="footer-timer">Auto-closing in <span id="seconds">15</span> seconds...</div>
    </div>

    <script src="blocked.js"></script>
</body>
</html>
