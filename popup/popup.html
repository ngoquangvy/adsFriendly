<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary: #22c55e;
            --secondary: #16a34a;
            --emerald: #10b981;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            width: 300px;
            margin: 0;
            padding: 1.5rem;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        h2 {
            margin: 0;
            font-size: 1.2rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-card {
            background: rgba(30, 41, 59, 0.7);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider.global {
            background-color: var(--primary);
        }

        .slider.friendly {
            background-color: #3b82f6; /* Blue for Full AI (Left) */
        }

        input:checked + .slider.friendly {
            background-color: var(--emerald); /* Emerald for Friendly (Right) */
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .footer {
            margin-top: 1rem;
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
        }

        .settings-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .settings-btn:active {
            transform: translateY(0);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        </div>
        <div>
            <h2>AdsFriendly</h2>
            <span style="font-size: 0.7rem; color: #64748b;">v1.0 - Friendly Protection</span>
        </div>
    </div>

    <div class="status-card">
        <span class="stat-label">Ads Blocked</span>
        <div class="stat-value" id="blocked-count">0</div>
        
        <button class="settings-btn" id="magic-wand-btn" style="background: rgba(16, 185, 129, 0.1); border: 1px dashed rgba(16, 185, 129, 0.4); margin-bottom: 8px;">
            <span style="font-size: 1.2rem;">🎯</span>
            <span>Zap Ad (Magic Wand)</span>
        </button>
        <button class="settings-btn" id="reset-rules-btn" style="background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); margin-bottom: 8px; color: #f87171; font-size: 0.7rem;">
            <span>↻</span>
            <span>Reset Rules for this Site</span>
        </button>

        <!-- Reflex Core: Undo Section -->
        <div id="undo-section" style="display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 10px; padding: 10px; margin-bottom: 20px; animation: slideIn 0.3s ease;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.7rem; color: #10b981;">Lỡ tay xóa nhầm?</span>
                <button id="undo-btn" style="background: #10b981; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold;">Khôi phục</button>
            </div>
        </div>

        <div class="toggle-container">
            <span>🛡️ General Protection</span>
            <label class="switch">
                <input type="checkbox" checked id="status-toggle">
                <span class="slider global"></span>
            </label>
        </div>
        <div class="toggle-container" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 15px;">
            <span>✨ Friendly Mode (AI)</span>
            <label class="switch">
                <input type="checkbox" checked id="friendly-mode-toggle">
                <span class="slider friendly"></span>
            </label>
        </div>
    </div>

    <button id="settings-btn" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 0.5rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Rules & Blacklist
    </button>

    <div class="footer">
        Intelligent protection for a better web.
    </div>

    <script src="popup.js"></script>
</body>
</html>
