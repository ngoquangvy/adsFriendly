<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Diagnostic Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>
    <aside>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            VANGUARD
        </div>
        <nav>
            <div class="nav-item active" data-view="overview">
                <span>📊 Overview</span>
            </div>
            <div class="nav-item" data-view="explorer">
                <span>🌐 Domain Explorer</span>
            </div>
            <div class="nav-item" data-view="mismatches">
                <span>⚠️ Error Detection</span>
            </div>
            <div class="nav-item" data-view="inspector">
                <span>🔍 Raw Inspector</span>
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <h1 id="view-title">Dashboard Overview</h1>
            <div class="header-actions">
                <button id="refresh-btn" class="nav-item" style="margin-bottom: 0;">↻ Sync Data</button>
            </div>
        </header>

        <div id="content-area" class="view-container">
            <!-- Content dynamically injected here -->
        </div>
    </main>

    <!-- Modal for JSON Inspector -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Event Raw Data</h2>
                <button id="close-modal" style="background:none; border:none; color:white; cursor:pointer; font-size:1.5rem;">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="modal-content"></pre>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
